<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultra OneRing UI Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #03080e; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            height: 100vh; margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            color: white; 
            /* 模擬背景的科技感漸層 */
            background-image: radial-gradient(circle at center, #0a1828 0%, #03080e 70%);
        }
        .ui-container { 
            position: relative; 
            width: 500px; height: 500px; 
            margin-bottom: 20px; 
            flex-shrink: 0;
        }
        .layer { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; 
            transition: opacity 0.8s ease-in-out; 
        }
        
        .text-container { 
            text-align: center; 
            font-family: 'Orbitron', sans-serif;
            font-size: 16px; font-weight: 700; letter-spacing: 1px;
            z-index: 10;
        }
        .text-wifi { color: #00ffff; margin-bottom: 8px; text-shadow: 0 0 8px #00ffff; }
        .text-ble { color: #1166ff; text-shadow: 0 0 8px #1166ff; }
        .white-text { color: white; text-shadow: none; }
        
    </style>
</head>
<body>
    <div class="ui-container">
        <!-- 直接放入新產生的超高還原度圖層 -->
        <img src="ring_wifi_active.svg" class="layer">
        <img src="ring_ble_active.svg" class="layer">
        <img src="icon_router.svg" class="layer">
    </div>
    
    <div class="text-container">
        <div class="text-wifi">WiFi: <span class="white-text">MedFlow_Office_2.4G (192.168.1.100)</span></div>
        <div class="text-ble">BLE: <span class="white-text">12 Devices Active</span></div>
    </div>
</body>
</html>
