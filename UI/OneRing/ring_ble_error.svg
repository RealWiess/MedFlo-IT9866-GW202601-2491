<svg width="500" height="500" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <filter id="glow_base" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="blur1" />
            <feGaussianBlur stdDeviation="10" result="blur2" />
            <feGaussianBlur stdDeviation="25" result="blur3" />
            <feMerge>
                <feMergeNode in="blur3" />
                <feMergeNode in="blur2" />
                <feMergeNode in="blur1" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
                <linearGradient id="gradBleErr" x1="0%" y1="100%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#ff0000" />
                    <stop offset="50%" stop-color="#ff5555" />
                    <stop offset="100%" stop-color="#cc0000" />
                </linearGradient>
            </defs>
            <g transform="translate(250,250) rotate(135)">
                <circle r="135" fill="none" stroke="url(#gradBleErr)" stroke-width="16" 
                        stroke-dasharray="636.1 212" stroke-linecap="round" filter="url(#glow_base)" />
                <circle r="115" fill="none" stroke="#ff0000" stroke-width="3" 
                        stroke-dasharray="40 10" opacity="0.7" filter="url(#glow_base)" />
            </g>
        </svg>