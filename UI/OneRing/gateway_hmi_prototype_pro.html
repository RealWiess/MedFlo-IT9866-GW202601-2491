<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway HMI Prototype Pro - Aesthetics & Slicing</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cyan-glow: #00E5FF;
            --blue-glow: #2979FF;
            --orange-alert: #FF9100;
            --font-tech: 'Orbitron', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #000;
            color: white;
            font-family: var(--font-tech);
            overflow: hidden;
        }

        /* 1. 深度背景層 (Background Layer) */
        .hmi-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('hmi_bg_pro.png');
            background-size: cover;
            background-position: center;
            z-index: 1;
            filter: brightness(0.9) contrast(1.1);
            transition: filter 1s ease-in-out;
        }

        .hmi-dashboard {
            position: relative;
            width: 600px;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            flex-shrink: 0;
        }

        /* 2. 切圖元件層：外圈 WiFi 圓環 (WiFi Ring Component - True Transparent PNG) */
        .layer-wifi-ring {
            position: absolute;
            width: 90%;
            height: 90%;
            background-image: url('hmi_wifi_ring_pro_trans.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            
            /* 使用真實 Alpha 通道去背，不再需要 mix-blend-mode */
            animation: rotate-slow 40s linear infinite, breathing-slow 3s infinite alternate ease-in-out;
            transition: filter 0.8s ease-in-out;
        }

        /* 3. 切圖元件層：內圈 BLE 圓環 (BLE Ring Component - True Transparent PNG) */
        .layer-ble-ring {
            position: absolute;
            width: 70%;
            height: 70%;
            background-image: url('hmi_ble_ring_pro_trans.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            
            animation: rotate-slow-rev 30s linear infinite, breathing-subtle 4s infinite alternate ease-in-out;
            transition: filter 0.8s ease-in-out;
        }

        /* 4. 切圖元件層：中心路由器/警告圖示 (Center Icons - True Transparent PNG) */
        .layer-center-icon {
            position: absolute;
            width: 25%;
            height: 25%;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 10;
            transition: background-image 0.5s ease-in-out, filter 0.5s ease-in-out;
            
            animation: breathing-glow 2s infinite alternate ease-in-out;
        }

        .icon-state-normal {
            background-image: url('hmi_icon_router_pro_trans.png');
        }

        .icon-state-error {
            background-image: url('hmi_icon_alert_pro_trans.png');
        }

        /* 5. 數據顯示面板 (Holographic Data Panels) */
        .data-panel {
            position: relative;
            margin-top: -30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        .data-row {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            background: rgba(0, 5, 15, 0.75);
            padding: 10px 28px;
            border-radius: 6px;
            border: 1px solid rgba(0, 229, 255, 0.25);
            backdrop-filter: blur(15px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(0, 229, 255, 0.05);
            transition: all 0.8s ease-in-out;
        }

        .label-wifi { color: var(--cyan-glow); text-shadow: 0 0 10px rgba(0, 229, 255, 0.5); }
        .label-ble { color: var(--blue-glow); text-shadow: 0 0 10px rgba(41, 121, 255, 0.5); border-color: rgba(41, 121, 255, 0.25); }
        .data-value { color: #ffffff; text-shadow: none; font-weight: 400; }

        /* =========================================================
           動畫庫 (Animations)
        ========================================================= */
        @keyframes rotate-slow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes rotate-slow-rev {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }
        @keyframes breathing-slow {
            0% { transform: scale(1); filter: brightness(0.9); }
            100% { transform: scale(1.02); filter: brightness(1.2); }
        }
        @keyframes breathing-subtle {
            0% { transform: scale(1); }
            100% { transform: scale(0.98); }
        }
        @keyframes breathing-glow {
            0% { filter: brightness(0.9) drop-shadow(0 0 5px rgba(0, 229, 255, 0.2)); }
            100% { filter: brightness(1.1) drop-shadow(0 0 15px rgba(0, 229, 255, 0.5)); }
        }

        /* =========================================================
           異常狀態連動 (System Error State Style Machine)
        ========================================================= */
        body.state-error .hmi-background {
            filter: brightness(0.6) hue-rotate(130deg); /* 背景轉為警戒暗紅 */
        }
        
        body.state-error .layer-wifi-ring,
        body.state-error .layer-ble-ring {
            /* 旋轉繼續，但顏色透過 hue-rotate 與亮部增強轉換為警示橘紅 */
            filter: hue-rotate(150deg) brightness(1.4) contrast(1.2);
        }

        body.state-error .layer-center-icon {
            animation: error-blink 1s infinite alternate ease-in-out;
        }

        @keyframes error-blink {
            0% { opacity: 0.5; filter: brightness(0.8) drop-shadow(0 0 5px rgba(255, 145, 0, 0.2)); }
            100% { opacity: 1; filter: brightness(1.3) drop-shadow(0 0 20px rgba(255, 145, 0, 0.6)); }
        }

        body.state-error .label-wifi,
        body.state-error .label-ble {
            color: var(--orange-alert);
            text-shadow: 0 0 10px rgba(255, 145, 0, 0.5);
            border-color: rgba(255, 145, 0, 0.3);
        }

        /* 模擬控制台 */
        .control-panel {
            position: absolute;
            bottom: 40px;
            z-index: 20;
        }
        
        .control-btn {
            padding: 12px 40px;
            background: rgba(0, 5, 15, 0.8);
            border: 1px solid var(--cyan-glow);
            color: var(--cyan-glow);
            font-family: var(--font-tech);
            font-size: 16px;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
            backdrop-filter: blur(10px);
        }
        
        .control-btn:hover { 
            background: rgba(0, 229, 255, 0.15); 
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.4);
        }
        
        body.state-error .control-btn {
            border-color: var(--orange-alert);
            color: var(--orange-alert);
            box-shadow: 0 0 15px rgba(255, 145, 0, 0.2);
        }
        body.state-error .control-btn:hover {
            background: rgba(255, 145, 0, 0.15);
        }
    </style>
</head>
<body>

    <!-- 1. 背景層 (切圖元件組裝) -->
    <div class="hmi-background"></div>

    <!-- 2. HMI 中控儀表 (切圖元件層疊) -->
    <div class="hmi-dashboard">
        
        <!-- 外環 WiFi 切圖元件 -->
        <div class="layer-wifi-ring"></div>

        <!-- 內環 BLE 切圖元件 -->
        <div class="layer-ble-ring"></div>

        <!-- 中心狀態圖示切圖元件 -->
        <div class="layer-center-icon icon-state-normal" id="center-icon"></div>
        
    </div>

    <!-- 3. 數據面板層 -->
    <div class="data-panel">
        <div class="data-row label-wifi">
            WIFI: <span class="data-value" id="val-wifi">MedFlow_Office_5G (192.168.1.100)</span>
        </div>
        <div class="data-row label-ble">
            BLE: <span class="data-value" id="val-ble">12 Devices Linked</span>
        </div>
    </div>

    <!-- 4. 系統模擬器 (控制按鈕) -->
    <div class="control-panel">
        <button class="control-btn" onclick="toggleSystemStatus()">TRIGGER GATEWAY EXCEPTION</button>
    </div>

    <script>
        let isSystemError = false;
        const bodyEl = document.body;
        const iconEl = document.getElementById('center-icon');
        const wifiVal = document.getElementById('val-wifi');
        const bleVal = document.getElementById('val-ble');
        const btnEl = document.querySelector('.control-btn');

        function toggleSystemStatus() {
            isSystemError = !isSystemError;
            
            if (isSystemError) {
                bodyEl.classList.add('state-error');
                
                // 更換為警告切圖圖示
                iconEl.classList.remove('icon-state-normal');
                iconEl.classList.add('icon-state-error');
                
                wifiVal.innerText = 'OFFLINE (DHCP TIMEOUT)';
                bleVal.innerText = 'DRIVER FAULT (CODE: 0x9F)';
                btnEl.innerText = 'RESTORE SYSTEM';
            } else {
                bodyEl.classList.remove('state-error');
                
                // 還原為路由器切圖圖示
                iconEl.classList.remove('icon-state-error');
                iconEl.classList.add('icon-state-normal');
                
                wifiVal.innerText = 'MedFlow_Office_5G (192.168.1.100)';
                bleVal.innerText = '12 Devices Linked';
                btnEl.innerText = 'TRIGGER GATEWAY EXCEPTION';
            }
        }
    </script>
</body>
</html>
