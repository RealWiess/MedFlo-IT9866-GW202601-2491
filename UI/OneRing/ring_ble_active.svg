<svg width="500" height="500" xmlns="http://www.w3.org/2000/svg">
            <defs>
        <filter id="glow_base" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="1.5" result="blur1" />
        <feGaussianBlur stdDeviation="4" result="blur2" />
        <feGaussianBlur stdDeviation="10" result="blur3" />
        <feMerge>
            <feMergeNode in="blur3" />
            <feMergeNode in="blur2" />
            <feMergeNode in="blur1" />
            <feMergeNode in="SourceGraphic" />
        </feMerge>
    </filter>
        <linearGradient id="gradWifi" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00ddff" />
            <stop offset="50%" stop-color="#00ffff" />
            <stop offset="100%" stop-color="#88ffff" />
        </linearGradient>
        <linearGradient id="gradBle" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#0044ff" />
            <stop offset="50%" stop-color="#1166ff" />
            <stop offset="100%" stop-color="#4488ff" />
        </linearGradient>
    </defs>
            <g transform="translate(250,250)">
                <!-- 主粗線 (藍色) -->
                <circle r="120" fill="none" stroke="url(#gradBle)" stroke-width="8" 
                        stroke-dasharray="565.4 188.4" stroke-linecap="round" 
                        transform="rotate(135)" filter="url(#glow_base)" />
                <!-- 內層細虛線 -->
                <circle r="105" fill="none" stroke="#1166ff" stroke-width="1.5" 
                        stroke-dasharray="494.8 164.9" stroke-linecap="round" 
                        transform="rotate(135)" opacity="0.8" />
                
                <!-- 上方 BLE 標籤與心跳圖示 -->
                <text x="-5" y="-123" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="12" text-anchor="middle" letter-spacing="1">BLE</text>
                <path d="M 15 -127 L 20 -127 L 23 -132 L 26 -122 L 29 -127 L 34 -127" fill="none" stroke="#1166ff" stroke-width="1.5"/>
            </g>
        </svg>