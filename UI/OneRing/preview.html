<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OneRing UI Preview</title>
    <style>
        body { background-color: #050a0f; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; color: white; }
        .ui-container { position: relative; width: 400px; height: 400px; margin-bottom: 20px; }
        .layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transition: opacity 0.5s; }
        .text-container { text-align: center; font-family: monospace; font-size: 16px; font-weight: bold; }
        .text-wifi { color: #00ffff; transition: color 0.5s; margin-bottom: 5px; text-shadow: 0 0 5px #00ffff; }
        .text-ble { color: #0066ff; transition: color 0.5s; text-shadow: 0 0 5px #0066ff; }
        .error-mode .text-wifi { color: #ffaa00; text-shadow: 0 0 5px #ffaa00;}
        .error-mode .text-ble { color: #ff0000; text-shadow: 0 0 5px #ff0000;}
        .normal-layer { opacity: 1; }
        .error-layer { opacity: 0; }
        .error-mode .normal-layer { opacity: 0; }
        .error-mode .error-layer { opacity: 1; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.02); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
        .active-layer { animation: pulse 2s infinite; }
        button { padding: 10px 20px; background: #1a2b3c; color: white; border: 1px solid #00ffff; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 40px; }
        button:hover { background: #00ffff; color: black; }
    </style>
</head>
<body>
    <div class="ui-container" id="ringUI">
        <img src="ring_wifi_track.svg" class="layer">
        <img src="ring_ble_track.svg" class="layer">
        <img src="ring_wifi_active.svg" class="layer normal-layer active-layer">
        <img src="ring_ble_active.svg" class="layer normal-layer active-layer">
        <img src="icon_router.svg" class="layer normal-layer">
        <img src="ring_wifi_error.svg" class="layer error-layer active-layer">
        <img src="ring_ble_error.svg" class="layer error-layer active-layer">
        <img src="icon_alert.svg" class="layer error-layer">
    </div>
    <div class="text-container" id="textUI">
        <div class="text-wifi" id="txtWifi">WiFi: MedFlow_Office_2.4G (192.168.1.100)</div>
        <div class="text-ble" id="txtBle">BLE: 12 Devices Active</div>
    </div>
    <button onclick="toggleMode()">Toggle Error / Normal State</button>
    <script>
        let isError = false;
        function toggleMode() {
            isError = !isError;
            const ui = document.getElementById('ringUI');
            const txt = document.getElementById('textUI');
            const txtWifi = document.getElementById('txtWifi');
            const txtBle = document.getElementById('txtBle');
            if(isError) {
                ui.classList.add('error-mode');
                txt.classList.add('error-mode');
                txtWifi.innerText = "WiFi: Disconnected";
                txtBle.innerText = "BLE: Driver Error (Retry 3)";
            } else {
                ui.classList.remove('error-mode');
                txt.classList.remove('error-mode');
                txtWifi.innerText = "WiFi: MedFlow_Office_2.4G (192.168.1.100)";
                txtBle.innerText = "BLE: 12 Devices Active";
            }
        }
    </script>
</body>
</html>
